name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test Lambda code
        run: python -m unittest discover -s lambda -p 'test_*.py' -v
      - name: Test CloudFront Functions code
        run: node cloudfront-function/test_handler_logic.js
      - name: Install CloudFormation linter
        run: python -m pip install cfn-lint
      - name: Validate CloudFormation templates
        run: cfn-lint infra/standalone.yaml infra/integration-addon.yaml
