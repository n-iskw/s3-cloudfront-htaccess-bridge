AWSTemplateFormatVersion: "2010-09-09"
Description: >
  s3-cloudfront-htaccess-bridge integration add-on. Adds Lambda + KVS +
  CloudFront Functions code + S3 event notification for an EXISTING S3 bucket.
  Does not create a new S3 bucket, CloudFront Distribution, or Lambda
  artifact bucket. You must attach the resulting function in CloudFront Functions to
  your existing Distribution's cache behavior manually (see Outputs and
  docs/integration-guide.md).

Parameters:
  ProjectName:
    Type: String
    Default: htaccess-bridge
  ContentBucketName:
    Type: String
    Description: "Name of your EXISTING site content bucket (not created by this template)."
Resources:
  HtaccessConfigStore:
    Type: AWS::CloudFront::KeyValueStore
    Properties:
      Name: !Sub "${ProjectName}-kvs"
      Comment: "Normalized .htaccess config published by htaccess_bridge Lambda"

  HtaccessBridgeManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ProjectName}-lambda-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3ContentBucketAccess
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !Sub "arn:aws:s3:::${ContentBucketName}"
          - Sid: S3ContentObjectAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
            Resource: !Sub "arn:aws:s3:::${ContentBucketName}/*"
          - Sid: CloudFrontKvsAccess
            Effect: Allow
            Action:
              - cloudfront-keyvaluestore:DescribeKeyValueStore
              - cloudfront-keyvaluestore:UpdateKeys
            Resource: !GetAtt HtaccessConfigStore.Arn
          - Sid: CloudWatchLogsAccess
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-fn*"

  HtaccessBridgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref HtaccessBridgeManagedPolicy

  HtaccessBridgeFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-fn"
      Runtime: python3.13
      Handler: htaccess_bridge.handler
      Role: !GetAtt HtaccessBridgeExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        # Placeholder only. The real code (with botocore[crt]) typically exceeds
        # what an inline ZipFile can hold, and is deployed separately with:
        #   aws lambda update-function-code --function-name <FunctionName output> \
        #     --zip-file fileb://htaccess_bridge.zip
        # This avoids needing a dedicated S3 artifact bucket. See
        # docs/integration-guide.md step 4.
        ZipFile: |
          def handler(event, context):
              raise RuntimeError(
                  "Placeholder code. Deploy the real function with: "
                  "aws lambda update-function-code --zip-file fileb://htaccess_bridge.zip"
              )
      Environment:
        Variables:
          KVS_ARN: !GetAtt HtaccessConfigStore.Arn
          HISTORY_PREFIX: _control-history

  HtaccessBridgeLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-fn"
      RetentionInDays: 7

  ContentBucketLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt HtaccessBridgeFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:s3:::${ContentBucketName}"

  # NOTE: if ContentBucketName already has other S3 event notifications
  # (another Lambda/SNS/SQS trigger), this custom resource REPLACES the
  # entire existing configuration -- it does not append. See
  # docs/integration-guide.md "existing notification configurations".
  BucketNotificationManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ProjectName}-bucket-notification-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3BucketNotificationAccess
            Effect: Allow
            Action:
              - s3:GetBucketNotification
              - s3:PutBucketNotification
            Resource: !Sub "arn:aws:s3:::${ContentBucketName}"
          - Sid: CloudWatchLogsAccess
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-bucket-notification-fn*"

  BucketNotificationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-bucket-notification-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref BucketNotificationManagedPolicy

  BucketNotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-bucket-notification-fn"
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt BucketNotificationExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import urllib.request

          import boto3

          def send_response(event, context, status, reason=""):
              response_body = json.dumps(
                  {
                      "Status": status,
                      "Reason": reason or f"See CloudWatch Logs: {context.log_stream_name}",
                      "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                      "StackId": event["StackId"],
                      "RequestId": event["RequestId"],
                      "LogicalResourceId": event["LogicalResourceId"],
                      "Data": {},
                  }
              ).encode("utf-8")
              req = urllib.request.Request(
                  url=event["ResponseURL"],
                  data=response_body,
                  method="PUT",
                  headers={"Content-Type": "", "Content-Length": str(len(response_body))},
              )
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  request_type = event["RequestType"]
                  props = event["ResourceProperties"]
                  bucket_name = props["BucketName"]
                  lambda_arn = props["LambdaFunctionArn"]
                  s3 = boto3.client("s3")

                  if request_type in ("Create", "Update"):
                      config = {
                          "LambdaFunctionConfigurations": [
                              {
                                  "LambdaFunctionArn": lambda_arn,
                                  "Events": ["s3:ObjectCreated:*"],
                                  "Filter": {
                                      "Key": {
                                          "FilterRules": [
                                              {"Name": "suffix", "Value": ".htaccess"}
                                          ]
                                      }
                                  },
                              },
                              {
                                  "LambdaFunctionArn": lambda_arn,
                                  "Events": ["s3:ObjectRemoved:*"],
                                  "Filter": {
                                      "Key": {
                                          "FilterRules": [
                                              {"Name": "suffix", "Value": ".htaccess"}
                                          ]
                                      }
                                  },
                              },
                              {
                                  "LambdaFunctionArn": lambda_arn,
                                  "Events": ["s3:ObjectCreated:*"],
                                  "Filter": {"Key": {"FilterRules": [{"Name": "suffix", "Value": ".htpasswd"}]}},
                              },
                              {
                                  "LambdaFunctionArn": lambda_arn,
                                  "Events": ["s3:ObjectRemoved:*"],
                                  "Filter": {"Key": {"FilterRules": [{"Name": "suffix", "Value": ".htpasswd"}]}},
                              },
                          ]
                      }
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket_name, NotificationConfiguration=config
                      )
                  elif request_type == "Delete":
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket_name, NotificationConfiguration={}
                      )

                  send_response(event, context, "SUCCESS")
              except Exception as exc:  # noqa: BLE001
                  send_response(event, context, "FAILED", reason=str(exc))

  BucketNotificationLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-bucket-notification-fn"
      RetentionInDays: 7

  ContentBucketNotification:
    Type: Custom::S3BucketNotification
    DependsOn:
      - ContentBucketLambdaPermission
    Properties:
      ServiceToken: !GetAtt BucketNotificationFunction.Arn
      BucketName: !Ref ContentBucketName
      LambdaFunctionArn: !GetAtt HtaccessBridgeFunction.Arn

  HtaccessViewerRequestFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${ProjectName}-viewer-request"
      FunctionConfig:
        Comment: "htaccess bridge viewer-request function"
        Runtime: cloudfront-js-2.0
        KeyValueStoreAssociations:
          - KeyValueStoreARN: !GetAtt HtaccessConfigStore.Arn
      AutoPublish: true
      FunctionCode: |
        import cf from 'cloudfront';
        import crypto from 'crypto';
        var kvs = cf.kvs();
        var KVS_KEY_REDIRECTS_META = 'htaccess-redirects-meta';
        var KVS_KEY_REDIRECTS_CHUNK_PREFIX = 'htaccess-redirects-';
        var KVS_KEY_AUTH_SCOPES_META = 'htaccess-auth-scopes-meta';
        var KVS_KEY_AUTH_SCOPES_CHUNK_PREFIX = 'htaccess-auth-scopes-';
        var KVS_KEY_DIRECTORY_INDEX_META = 'htaccess-directory-index-meta';
        var KVS_KEY_DIRECTORY_INDEX_CHUNK_PREFIX = 'htaccess-directory-index-';
        var KVS_KEY_MAINTENANCE = 'htaccess-maintenance';

        async function handler(event) {
          var request = event.request;
          var uri = request.uri || '/';

          if (isBlockedPath(uri)) {
            return { statusCode: 403, statusDescription: 'Forbidden' };
          }

          var config = await loadConfig();
          var authScope = findAuthScope(uri, config);

          if (authScope && !isAuthorized(event, request, authScope)) {
            return unauthorized(authScope);
          }

          var redirect = findRedirect(uri, config.redirects || []);
          if (redirect) {
            return {
              statusCode: redirect.status,
              statusDescription: redirect.status === 301 ? 'Moved Permanently' : 'Found',
              headers: { location: { value: redirect.location } }
            };
          }

          request.uri = resolveIndexDocument(uri, config.directoryIndexScopes || []);
          return request;
        }

        async function loadConfig() {
          var results = await Promise.all([
            loadBinPackedRules(KVS_KEY_REDIRECTS_META, KVS_KEY_REDIRECTS_CHUNK_PREFIX),
            loadBinPackedRules(KVS_KEY_AUTH_SCOPES_META, KVS_KEY_AUTH_SCOPES_CHUNK_PREFIX),
            loadBinPackedRules(KVS_KEY_DIRECTORY_INDEX_META, KVS_KEY_DIRECTORY_INDEX_CHUNK_PREFIX),
            loadKvsJson(KVS_KEY_MAINTENANCE, { enabled: false, realm: 'Maintenance' })
          ]);
          return {
            schemaVersion: 1,
            redirects: results[0],
            authScopes: results[1],
            directoryIndexScopes: results[2],
            maintenance: results[3]
          };
        }

        async function loadBinPackedRules(metaKey, chunkPrefix) {
          var meta = await loadKvsJson(metaKey, { chunkCount: 0 });
          var chunkCount = meta.chunkCount || 0;
          if (chunkCount === 0) {
            return [];
          }
          var chunkPromises = [];
          for (var i = 0; i < chunkCount; i++) {
            chunkPromises.push(loadKvsJson(chunkPrefix + i, []));
          }
          var chunks = await Promise.all(chunkPromises);
          var rules = [];
          for (var j = 0; j < chunks.length; j++) {
            rules = rules.concat(chunks[j]);
          }
          return rules;
        }

        async function loadKvsJson(key, fallback) {
          try {
            var raw = await kvs.get(key);
            return JSON.parse(raw);
          } catch (e) {
            return fallback;
          }
        }

        function isBlockedPath(uri) {
          return uri === '/.htaccess' || endsWith(uri, '/.htaccess') ||
            uri === '/.htpasswd' || endsWith(uri, '/.htpasswd') ||
            uri.indexOf('/_control-history/') === 0;
        }

        function findAuthScope(uri, config) {
          var scopes = config.authScopes || [];
          for (var i = 0; i < scopes.length; i++) {
            if (scopes[i].enabled && startsWith(uri, scopes[i].pathPrefix)) {
              return scopes[i];
            }
          }
          if (config.maintenance && config.maintenance.enabled) {
            return config.maintenance;
          }
          return null;
        }

        function isAuthorized(event, request, maintenance) {
          if (isAllowedViewerIp(event, maintenance.allowIps || [])) {
            return true;
          }
          var headers = request.headers || {};
          var auth = headers.authorization && headers.authorization.value;
          if (!auth || auth.substring(0, 6).toLowerCase() !== 'basic ') {
            return false;
          }
          var decoded;
          try {
            decoded = Buffer.from(auth.substring(6), 'base64').toString('utf8');
          } catch (e) {
            return false;
          }
          var separator = decoded.indexOf(':');
          if (separator < 1) {
            return false;
          }
          var username = decoded.substring(0, separator);
          var password = decoded.substring(separator + 1);
          var digest = crypto.createHash('sha1').update(password).digest('base64');
          var credentials = maintenance.credentials || [];
          for (var i = 0; i < credentials.length; i++) {
            if (credentials[i].username === username && credentials[i].sha1 === digest) {
              return true;
            }
          }
          return false;
        }

        function isAllowedViewerIp(event, allowIps) {
          var viewerIp = event.viewer && event.viewer.ip;
          if (!viewerIp || viewerIp.indexOf(':') !== -1) {
            return false;
          }
          var viewerInt = ipv4ToInt(viewerIp);
          if (viewerInt === null) {
            return false;
          }
          for (var i = 0; i < allowIps.length; i++) {
            if (ipv4InCidr(viewerInt, allowIps[i])) {
              return true;
            }
          }
          return false;
        }

        function ipv4InCidr(viewerInt, cidr) {
          var parts = cidr.split('/');
          var networkInt = ipv4ToInt(parts[0]);
          if (networkInt === null) {
            return false;
          }
          var prefix = parts.length > 1 ? parseInt(parts[1], 10) : 32;
          if (prefix < 0 || prefix > 32) {
            return false;
          }
          var mask = prefix === 0 ? 0 : (0xffffffff << (32 - prefix)) >>> 0;
          return (viewerInt & mask) === (networkInt & mask);
        }

        function ipv4ToInt(ip) {
          var parts = ip.split('.');
          if (parts.length !== 4) {
            return null;
          }
          var value = 0;
          for (var i = 0; i < 4; i++) {
            var part = parseInt(parts[i], 10);
            if (isNaN(part) || part < 0 || part > 255 || String(part) !== parts[i]) {
              return null;
            }
            value = ((value << 8) + part) >>> 0;
          }
          return value >>> 0;
        }

        function unauthorized(maintenance) {
          var realm = maintenance.realm || 'Maintenance';
          return {
            statusCode: 401,
            statusDescription: 'Unauthorized',
            headers: {
              'www-authenticate': { value: 'Basic realm="' + escapeRealm(realm) + '"' },
              'cache-control': { value: 'no-store' }
            }
          };
        }

        function findRedirect(uri, rules) {
          for (var i = 0; i < rules.length; i++) {
            var rule = rules[i];
            if (rule.type === 'redirect' && startsWith(uri, rule.from)) {
              return { status: rule.status, location: appendRemainder(uri, rule.from, rule.to) };
            }
            if (rule.type === 'rewrite') {
              var basePath = rule.basePath || '/';
              if (!startsWith(uri, basePath)) {
                continue;
              }
              var relativePath = basePath === '/' ? uri.substring(1) : uri.substring(basePath.length);
              var re = new RegExp(rule.pattern);
              if (re.test(relativePath)) {
                return { status: rule.status, location: relativePath.replace(re, rule.to) };
              }
            }
          }
          return null;
        }

        function appendRemainder(uri, from, to) {
          var remainder = uri.substring(from.length);
          if (!remainder) return to;
          if (to.charAt(to.length - 1) === '/' || remainder.charAt(0) === '/') return to + remainder;
          return to + '/' + remainder;
        }

        function resolveIndexDocument(uri, directoryIndexScopes) {
          if (uri !== '/' && uri.charAt(uri.length - 1) !== '/' && hasFileExtension(uri)) {
            return uri;
          }
          var directoryPath = uri.charAt(uri.length - 1) === '/' ? uri : uri + '/';
          var indexName = firstDirectoryIndexName(directoryPath, directoryIndexScopes) || 'index.html';
          if (uri === '/') return '/' + indexName;
          if (uri.charAt(uri.length - 1) === '/') return uri + indexName;
          return uri + '/' + indexName;
        }

        function firstDirectoryIndexName(uri, directoryIndexScopes) {
          for (var i = 0; i < directoryIndexScopes.length; i++) {
            var scope = directoryIndexScopes[i];
            if (startsWith(uri, scope.pathPrefix) && scope.names && scope.names.length > 0) {
              return scope.names[0];
            }
          }
          return null;
        }

        function hasFileExtension(uri) {
          var lastSegment = uri.substring(uri.lastIndexOf('/') + 1);
          var lastDotIndex = lastSegment.lastIndexOf('.');
          if (lastDotIndex === -1) return false;
          if (lastDotIndex === 0) return false;
          if (lastDotIndex === lastSegment.length - 1) return false;
          var extension = lastSegment.substring(lastDotIndex + 1);
          return /^[A-Za-z0-9]{1,10}$/.test(extension);
        }

        function startsWith(value, prefix) {
          return value.substring(0, prefix.length) === prefix;
        }

        function endsWith(value, suffix) {
          return value.substring(value.length - suffix.length) === suffix;
        }

        function escapeRealm(value) {
          return String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
        }

Outputs:
  KvsArn:
    Value: !GetAtt HtaccessConfigStore.Arn
  LambdaFunctionName:
    Value: !Ref HtaccessBridgeFunction
  CloudFrontFunctionArn:
    Description: "Add this to your EXISTING Distribution's cache behavior FunctionAssociations (viewer-request). This template does not modify your Distribution."
    Value: !GetAtt HtaccessViewerRequestFunction.FunctionMetadata.FunctionARN
